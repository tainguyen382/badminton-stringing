<main class="max-w-7xl pb-8 justify-center mx-auto">
    <div class="space-y-6">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200">
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between">
                <h2 class="text-lg font-semibold text-gray-900">Expenses</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Vendor</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Items</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Price</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <tr *ngFor="let expense of paginatedData" class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ expense[1] }}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ expense[2] }}</td>
                            <td class="px-6 py-4 text-sm text-gray-600">{{ expense[8] }}</td>
                            <td class="px-6 py-4 text-sm text-gray-600">{{ expense[9] }}</td>

                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
                <div class="text-sm text-gray-600">
                    Page {{ currentPage }} of {{ totalPages }} ({{ (expenseData$ | async)?.length || 0 }} items)
                </div>
                <div class="flex gap-2">
                    <button (click)="previousPage()" [disabled]="currentPage === 1"
                        class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        Previous
                    </button>
                    <button (click)="nextPage()" [disabled]="currentPage === totalPages"
                        class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        Next
                    </button>
                </div>
            </div>
        </div>
    </div>
</main>
