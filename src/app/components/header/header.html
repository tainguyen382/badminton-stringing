<section>
    <div class="flex items-center justify-between">
      <div>
        <p class="font-bold text-xl">Badminton Stringing Manager</p>
        <p class="text-sm text-gray-500">Business management system</p>
        <p class="text-sm text-gray-500">{{ date | date }}</p>
      </div>
      <div>
        <img src="assets/badmintonswing.png" alt="logo" class="w-14 h-14  object-contain" />
      </div>
    </div>
    <div class="border-t border-gray-300 my-4"></div>
    <div class="flex flex-wrap gap-3">
      <p *ngFor="let item of menu" class="cursor-pointer rounded-md border border-transparent px-3 py-2 hover:border-blue-500 hover:text-blue-600" (click)="navigate(item)" [class.text-blue-600]="item.active">
        {{ item.name }}
      </p>
    </div>
    <div class="border-t border-gray-300 my-4"></div>
</section>
